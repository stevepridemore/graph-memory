name: Release

# Publishes the graph-memory-mcp container image to GHCR on every v* tag push,
# tagged with both the version and `latest`. The image is what the
# install-primary.sh script pulls — no clone or local build required for users.

on:
  push:
    tags:
      - 'v*'
    # TEMP: also build on the install-test branch so we can dogfood the
    # release flow end-to-end before tagging. Remove before merging to main.
    branches:
      - 'install-test'

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    name: Publish container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Branch builds (install-test) tag the image with the branch name
          # only — don't move :latest. Tag builds tag both the version and
          # :latest. github.ref_name resolves to the tag name on tag pushes
          # and the branch name on branch pushes.
          tags: |
            ghcr.io/stevepridemore/graph-memory-mcp:${{ github.ref_name }}
            ${{ startsWith(github.ref, 'refs/tags/v') && 'ghcr.io/stevepridemore/graph-memory-mcp:latest' || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
